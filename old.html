<html>
    <head>
        <style type="text/css">
            body {
                position: relative;
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                width: 100vw;
                height: 100vh;
                background-color: black;
                overflow: hidden;
                cursor: move;
                user-select: none;
                touch-action: none;
            }
            .grid {
                position: absolute;
                left: 0;
                top: 0;
                display: grid;
                width: fit-content;
                cursor: inherit;
                touch-action: none;
            }
            .canva {
                position: absolute;
                left: 0;
                right: 0;
                top: 0;
                bottom: 0;
            }
            .player {
                z-index: 1;
                position: absolute;
                border-radius: 50%;
                background-color: blue;
            }
            .square {
                position: relative;
                width: 100px;
                height: 100px;
                border: 1px solid rgba(255, 255, 255, .1);
                box-sizing: border-box;
            }
            .square::before {
                content: "";
                position: absolute;
                top: 50%;
                left: calc(var(--x-line-left, 50) * 1%);
                width: calc(var(--x-line-size, 0) * 1%);
                height: 4px;
                background: white;
                transform: translateY(-50%);
                pointer-events: none;
            }
            .square::after {
                content: "";
                position: absolute;
                left: 50%;
                top: calc(var(--y-line-top, 50) * 1%);
                width: 4px;
                height: calc(var(--y-line-size, 0) * 1%);
                background: white;
                transform: translateX(-50%);
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div class="grid">
            <div class="canva">
                <div class="player"></div>
            </div>
        </div>
        <script type="text/javascript">
            var ratio = 1;
            var centered = false;

            class Player {
                static SIZE = 30;

                constructor(context) {
                    this.context = context;
                    this.square = undefined;
                }

                draw() {
                    let gridElement = document.querySelector(".player");
                    gridElement.style.setProperty("width", Player.getSize());
                    gridElement.style.setProperty("height", Player.getSize());
                    gridElement.style.setProperty("left", this.getX());
                    gridElement.style.setProperty("top", this.getY());
                }

                moveRight() {
                    this.square.right
                    && this.move(this.x + 1, this.y);
                }

                moveLeft() {
                    this.square.left
                    && this.move(this.x - 1, this.y);
                }

                moveTop() {
                    this.square.top
                    && this.move(this.x, this.y - 1);
                }

                moveBottom() {
                    this.square.bottom
                    && this.move(this.x, this.y + 1);
                }

                move(x, y) {
                    this.square = this.context.getSquare(x, y);
                    this.x = x;
                    this.y = y;
                    if (centered) this.context.centerOnPlayer(this);
                    this.draw();
                }

                getX() {
                    return Square.getSize() / 2 + this.x * Square.getSize() - Player.getSize() / 2;
                }

                getY() {
                    return Square.getSize() / 2 + this.y * Square.getSize() - Player.getSize() / 2
                }

                static getSize() {
                    return Player.SIZE * ratio;
                }
            }

            class Grid {
                constructor(grid) {
                    this.grid = grid;
                    this.element = document.querySelector(".grid");

                    this.element.addEventListener("click", (e) => {
                        const rect = this.element.getBoundingClientRect();
                        const xPx = e.clientX - rect.left;
                        const yPx = e.clientY - rect.top;

                        const cellSize = Square.getSize();
                        const x = Math.floor(xPx / cellSize);
                        const y = Math.floor(yPx / cellSize);

                        console.log({ xPx, yPx, x, y });
                    });
                }

                draw() {
                    const canva = this.element.querySelector(".canva");
                    this.element.innerHTML = "";
                    this.element.appendChild(canva);
                    for (var y = 0; y < this.grid.length; y++) {
                        for (var x = 0; x < this.grid[y].length; x++) {
                            this.grid[y][x].draw(this.element, x, y);
                        }
                    }
                    if (!centered) this.center();
                }

                getSquare(x, y) {
                    return this.grid[y][x];
                }

                drag(x, y) {
                    const currentLeft = parseFloat(this.element.style.left || "0") || 0;
                    const currentTop = parseFloat(this.element.style.top || "0") || 0;
                    this.element.style.left = (currentLeft + x) + "px";
                    this.element.style.top = (currentTop + y) + "px";
                }

                center() {
                    this.element.style.left = ((window.innerWidth - this.element.offsetWidth) / 2) + "px";
                    this.element.style.top = ((window.innerHeight - this.element.offsetHeight) / 2) + "px";
                }

                centerOnPlayer(player) {
                    this.element.style.left = (window.innerWidth / 2 - player.getX()) + "px";
                    this.element.style.top = (window.innerHeight / 2 - player.getY()) + "px";
                }
            }

            class Square {
                static SIZE = 100;

                constructor(left = 0, top = 0, right = 0, bottom = 0) {
                    this.left = left;
                    this.top = top;
                    this.right = right;
                    this.bottom = bottom;
                }

                draw(context, x, y) {
                    let squareElement = document.createElement("div");
                    squareElement.className = "square";
                    squareElement.style.width = Square.getSize() + "px";
                    squareElement.style.height = Square.getSize() + "px";
                    squareElement.style.gridColumn = x+1;
                    squareElement.style.gridRow = y+1;
                    squareElement = this.drawDirection(squareElement);
                    context.appendChild(squareElement);
                }

                drawDirection(squareElement) {
                    var xLineSize = (this.left + this.right) * 50;
                    var yLineSize = (this.top + this.bottom) * 50;
                    var left = this.left ? 0 : 50; 
                    var top = this.top ? 0 : 50;
                    squareElement.style.setProperty("--x-line-size", xLineSize);
                    squareElement.style.setProperty("--x-line-left", left);
                    squareElement.style.setProperty("--y-line-size", yLineSize);
                    squareElement.style.setProperty("--y-line-top", top);
                    return squareElement;
                }

                static getSize() {
                    return Square.SIZE * ratio;
                }
            }

            class Grass extends Square {

            }

            var grid = new Grid([
                [new Square(0, 0, 1, 1), new Square(1, 0, 1, 1), new Square(1, 0, 1, 1), new Square(1, 0, 1, 1), new Square(1, 0, 0, 1)],
                [new Square(0, 1, 1, 1), new Square(1, 1, 1, 1), new Square(1, 1, 1, 1), new Square(1, 1, 1, 1), new Square(1, 1, 0, 1)],
                [new Square(0, 1, 1, 1), new Square(1, 1, 1, 1), new Square(1, 1, 1, 1), new Square(1, 1, 1, 1), new Square(1, 1, 0, 1)],
                [new Square(0, 1, 1, 1), new Square(1, 1, 1, 1), new Square(1, 1, 1, 1), new Square(1, 1, 1, 1), new Square(1, 1, 0, 1)],
                [new Square(0, 1, 1, 0), new Square(1, 1, 1, 0), new Square(1, 1, 1, 0), new Square(1, 1, 1, 0), new Square(1, 1, 0, 0)],
            ]);
            var player = new Player(grid);

            grid.draw();
            player.move(0, 0);  

            window.addEventListener("keydown", (e) => {
                switch (e.key) {
                    case "ArrowRight":
                        e.preventDefault();
                        player.moveRight();
                        break;
                    case "ArrowLeft":
                        e.preventDefault();
                        player.moveLeft();
                        break;
                    case "ArrowUp":
                        e.preventDefault();
                        player.moveTop();
                        break;
                    case "ArrowDown":
                        e.preventDefault();
                        player.moveBottom();
                        break;
                }
            });

            window.addEventListener("wheel", (e) => {
                e.preventDefault();
                const zoomFactor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
                ratio = Math.min(3, Math.max(0.3, ratio * zoomFactor));
                grid.draw();
                player.draw();
            }, { passive: false });

            const dragState = {
                active: false,
                pointerId: null,
                lastX: 0,
                lastY: 0,
            };

                dragState.active = false;
                dragState.pointerId = null;
            }

            document.body.addEventListener("pointerup", endDrag);
            document.body.addEventListener("pointercancel", endDrag);*/

        </script>
    </body>
